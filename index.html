<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>誠心有筊</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans TC", sans-serif;
      background-color: #EBE1CD;
      color: #5E4638;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .container {
      text-align: center;
      max-width: 480px;
    }
    h1 {
      font-size: 2.5rem;
      letter-spacing: 8px;
      margin-bottom: 8px;
    }
    .subtitle {
      font-size: 1rem;
      color: #8a7a6c;
      margin-bottom: 32px;
      letter-spacing: 2px;
    }
    .desc {
      font-size: 1rem;
      line-height: 1.8;
      margin-bottom: 32px;
    }
    .links {
      display: flex;
      flex-direction: column;
      gap: 12px;
      align-items: center;
    }
    .links a {
      color: #9F353A;
      text-decoration: none;
      font-size: 0.95rem;
      padding: 10px 24px;
      border: 1px solid #9F353A;
      border-radius: 8px;
      transition: background 0.2s, color 0.2s;
    }
    .links a:hover {
      background: #9F353A;
      color: #EBE1CD;
    }
    .footer {
      position: fixed;
      bottom: 16px;
      font-size: 0.75rem;
      color: #8a7a6c;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>誠心有筊</h1>
    <p class="subtitle">Sîng Sim ū Pue</p>
    <p class="desc">
      以誠敬之心，求神明指引。<br>
      3D 物理模擬擲筊杯，完整問事流程。<br>
      心誠則靈。
    </p>
    <div class="links">
      <a href="https://play.google.com/store/apps/details?id=com.pinsian.singsimupue">Google Play 下載</a>
      <a href="privacy-policy.html">隱私權政策</a>
    </div>
  </div>
  <p class="footer">© 2026 PinSian開發</p>
</body>
</html>
